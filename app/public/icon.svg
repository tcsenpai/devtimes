<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="paper" cx="0.5" cy="0.4" r="0.7">
      <stop offset="0%" stop-color="#f7f0dd"/>
      <stop offset="100%" stop-color="#e9dfc4"/>
    </radialGradient>
  </defs>
  <!-- newspaper sheet with subtle fold -->
  <rect x="6" y="6" width="52" height="52" rx="2" fill="url(#paper)" stroke="#1a1a17" stroke-width="2"/>
  <!-- masthead -->
  <rect x="10" y="11" width="44" height="2" fill="#1a1a17"/>
  <text x="32" y="22" text-anchor="middle" font-family="serif" font-weight="900" font-size="9" fill="#1a1a17" font-style="italic">Dev Times</text>
  <rect x="10" y="25" width="44" height="1" fill="#1a1a17"/>
  <rect x="10" y="27" width="44" height="0.6" fill="#1a1a17"/>
  <!-- columns of text (lines) -->
  <g stroke="#1a1a17" stroke-width="0.8" opacity="0.55">
    <line x1="10" y1="32" x2="30" y2="32"/>
    <line x1="10" y1="35" x2="30" y2="35"/>
    <line x1="10" y1="38" x2="28" y2="38"/>
    <line x1="10" y1="41" x2="30" y2="41"/>
    <line x1="10" y1="44" x2="30" y2="44"/>
    <line x1="10" y1="47" x2="29" y2="47"/>
    <line x1="10" y1="50" x2="30" y2="50"/>
    <line x1="10" y1="53" x2="26" y2="53"/>
  </g>
  <line x1="32" y1="30" x2="32" y2="54" stroke="#1a1a17" stroke-width="0.5"/>
  <g stroke="#1a1a17" stroke-width="0.8" opacity="0.55">
    <line x1="34" y1="32" x2="54" y2="32"/>
    <line x1="34" y1="35" x2="54" y2="35"/>
    <line x1="34" y1="38" x2="52" y2="38"/>
    <line x1="34" y1="41" x2="54" y2="41"/>
    <line x1="34" y1="44" x2="50" y2="44"/>
    <line x1="34" y1="47" x2="54" y2="47"/>
    <line x1="34" y1="50" x2="54" y2="50"/>
    <line x1="34" y1="53" x2="48" y2="53"/>
  </g>
  <!-- corner fold -->
  <path d="M 58 6 L 58 14 L 50 6 Z" fill="#cc785c" stroke="#1a1a17" stroke-width="1"/>
</svg>
